<svg viewBox="0 0 400 90" xmlns="http://www.w3.org/2000/svg">

  <!-- ── Crest / shield ── -->
  <!-- Shield body -->
  <path d="M5 10 L50 10 L50 58 Q27 76 5 58 Z" fill="#006B54" opacity="0.1"/>
  <path d="M5 10 L50 10 L50 58 Q27 76 5 58 Z" fill="none" stroke="#006B54" stroke-width="1.8"/>

  <!-- Crown -->
  <path d="M9 10 L12 4 L16 8 L22 3 L27 3 L33 3 L38 8 L42 4 L46 10"
        fill="none" stroke="#006B54" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Horizontal bar -->
  <line x1="5" y1="34" x2="50" y2="34" stroke="#006B54" stroke-width="1.3"/>
  <!-- Vertical bar -->
  <line x1="27" y1="10" x2="27" y2="70" stroke="#006B54" stroke-width="1.3"/>

  <!-- Top-left: two stripes -->
  <line x1="7"  y1="19" x2="25" y2="19" stroke="#006B54" stroke-width="2.2"/>
  <line x1="7"  y1="27" x2="25" y2="27" stroke="#006B54" stroke-width="2.2"/>

  <!-- Top-right: saltire (X) -->
  <line x1="30" y1="12" x2="48" y2="32" stroke="#006B54" stroke-width="1.6"/>
  <line x1="48" y1="12" x2="30" y2="32" stroke="#006B54" stroke-width="1.6"/>

  <!-- Bottom-left: chevron -->
  <polyline points="7,52 17,42 25,52" fill="none" stroke="#006B54" stroke-width="1.8"/>

  <!-- Bottom-right: plain cross -->
  <line x1="38" y1="36" x2="38" y2="60" stroke="#006B54" stroke-width="1.6"/>
  <line x1="29" y1="48" x2="48" y2="48" stroke="#006B54" stroke-width="1.6"/>

  <!-- ── Typography ── -->
  <text x="62" y="54"
        font-family="Georgia, Times New Roman, serif"
        font-size="36"
        font-weight="bold"
        font-style="italic"
        fill="#006B54">West Berkshire</text>

  <text x="64" y="74"
        font-family="Arial, Helvetica, sans-serif"
        font-size="12"
        font-weight="600"
        letter-spacing="5.5"
        fill="#006B54">COUNCIL</text>

</svg>
